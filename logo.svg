<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Briefcase body -->
  <rect x="116" y="200" width="280" height="196" rx="24" fill="white" opacity="0.95"/>
  <!-- Briefcase handle -->
  <rect x="188" y="148" width="136" height="72" rx="16" fill="none" stroke="white" stroke-width="20" opacity="0.95"/>
  <!-- Briefcase clasp/divider -->
  <rect x="116" y="272" width="280" height="4" fill="#6366f1" opacity="0.3"/>
  <!-- Dollar sign -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#6366f1" text-anchor="middle" dominant-baseline="central">$</text>
</svg>
